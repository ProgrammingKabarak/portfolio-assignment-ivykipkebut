    <path d="M181 244c20-32 47-51 86-64" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
    <path d="M135 166a56 56 0 0 1 90 0" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" opacity=".9"/>
    <path d="M154 187a31 31 0 0 1 52 0" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" opacity=".9"/>
    <circle cx="180" cy="209" r="8" fill="#FFFFFF"/>
    <path d="M228 92h42m-21-21v42" stroke="#FACC15" stroke-width="10" stroke-linecap="round"/>
    <path d="M83 256h54m0 0v-30m0 30h36" fill="none" stroke="#16A34A" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="83" cy="256" r="8" fill="#16A34A"/>
    <circle cx="173" cy="256" r="8" fill="#16A34A"/>
