<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Smart Drop full-color logo</title>
  <desc id="desc">A minimalist logo for Smart Drop combining water, leaf, solar energy, IoT signal, and circuit details.</desc>
  <defs>
    <linearGradient id="drop" x1="148" y1="42" x2="232" y2="264" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="leaf" x1="178" y1="178" x2="256" y2="244" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E"/>
      <stop offset="1" stop-color="#16A34A"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#111827" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="1200" height="360" fill="none"/>
  <g filter="url(#softShadow)">
