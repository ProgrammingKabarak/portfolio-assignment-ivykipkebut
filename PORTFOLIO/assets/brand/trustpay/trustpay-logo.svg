<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 320" role="img" aria-labelledby="title desc">
  <title id="title">TrustPay brand logo</title>
  <desc id="desc">A premium fintech logo for TrustPay with a shield, QR code, and secure payment checkmark.</desc>
  <defs>
    <linearGradient id="shieldGradient" x1="92" y1="58" x2="244" y2="264" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#111827" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="1160" height="320" fill="none"/>
