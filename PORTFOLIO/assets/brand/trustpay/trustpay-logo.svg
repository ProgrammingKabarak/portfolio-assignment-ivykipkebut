  <text x="340" y="166" fill="#111827" font-family="Inter, SF Pro Display, Segoe UI, Arial, sans-serif" font-size="90" font-weight="820" letter-spacing="0">Trust</text>
  <text x="562" y="166" fill="#2563EB" font-family="Inter, SF Pro Display, Segoe UI, Arial, sans-serif" font-size="90" font-weight="820" letter-spacing="0">Pay</text>
